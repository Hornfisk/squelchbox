<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SquelchBox — Demo</title>
<style>
  :root {
    --bg: #0e0e10;
    --panel: #17171a;
    --line: #2a2a2f;
    --text: #e9e6dc;
    --dim: #8a8678;
    --accent: #c8b377;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 32px;
    letter-spacing: -0.01em;
  }
  h1 a { color: var(--text); text-decoration: none; }
  h1 a:hover { color: var(--accent); }
  .sub {
    color: var(--dim);
    font-size: 14px;
    line-height: 1.5;
  }
  .sub a { color: var(--accent); text-decoration: none; }
  .sub a:hover { text-decoration: underline; }
  h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--dim);
    margin: 32px 0 12px;
    font-weight: 600;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .card .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  audio {
    width: 100%;
    height: 32px;
    display: block;
    filter: invert(0.9) hue-rotate(180deg);
  }
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: var(--dim);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><a href="https://github.com/Hornfisk/squelchbox">SquelchBox</a> &mdash; Demo</h1>
    <p class="sub">
      TB-303-style acid bassline synth. Rust + nih-plug. VST3 / CLAP / Standalone.
      <br>
      <a href="https://github.com/Hornfisk/squelchbox">&larr; back to repo</a>
    </p>
  </header>

  <h2>Listen</h2>
  <div class="card">
    <div class="name">squelchbox_demo.mp3 &mdash; 320 kbps</div>
    <audio controls preload="metadata" src="audio/squelchbox_demo.mp3"></audio>
  </div>

  <footer>
    <a href="https://github.com/Hornfisk/squelchbox">github.com/Hornfisk/squelchbox</a>
  </footer>
</div>
</body>
</html>
